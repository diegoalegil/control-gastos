<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>Control de Gastos</title>
    <meta name="description" content="Tus ingresos y gastos del mes, privados y sin conexión." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gastos" />
    <meta name="theme-color" content="#f6f4ee" />
    <link rel="icon" href="%BASE_URL%icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <script>
      // Tema resuelto antes de pintar para evitar destellos (la preferencia vive en localStorage)
      try {
        var t = localStorage.getItem('cg-theme')
        if (t !== 'light' && t !== 'dark')
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        document.documentElement.dataset.theme = t
        if (t === 'dark')
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1b1a17')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
